<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" shape-rendering="crispEdges" role="img" aria-label="Ceremonia real">
  <defs>
    <linearGradient id="throne" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a08"/>
      <stop offset="100%" stop-color="#120804"/>
    </linearGradient>
    <linearGradient id="light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffd54f" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="#0d0618"/>
  <rect x="0" y="0" width="800" height="200" fill="url(#light)"/>
  <!-- Trono -->
  <rect x="320" y="140" width="160" height="180" fill="url(#throne)" stroke="#b8860b" stroke-width="3"/>
  <rect x="300" y="120" width="200" height="35" fill="#4a3520" stroke="#d4af37" stroke-width="2"/>
  <polygon points="400,60 430,120 370,120" fill="#ffd700" opacity="0.85"/>
  <rect x="385" y="115" width="30" height="12" fill="#ffec80"/>
  <!-- Rey -->
  <ellipse cx="400" cy="195" rx="24" ry="28" fill="#e8c4a0"/>
  <path fill="#6a1b9a" d="M370 218 h60 l-5 75 h-50 z"/>
  <ellipse cx="400" cy="175" rx="28" ry="8" fill="#ffd700"/>
  <!-- Caballero arrodillado -->
  <ellipse cx="400" cy="318" rx="20" ry="18" fill="#b8c0d0"/>
  <path fill="#1565c0" d="M385 330 h30 l-5 55 h-20 z"/>
  <path fill="#0d47a1" d="M375 355 l25 35 25-35 h-50 z"/>
  <rect x="375" y="375" width="50" height="8" fill="#263238"/>
  <!-- Espada ceremonial -->
  <line x1="400" y1="200" x2="400" y2="295" stroke="#e0e0e0" stroke-width="4"/>
  <rect x="392" y="292" width="16" height="6" fill="#d4af37"/>
  <!-- Princesa -->
  <ellipse cx="520" cy="250" rx="18" ry="22" fill="#ffd4dc"/>
  <path fill="#ec407a" d="M502 268 h36 v55 h-36 z"/>
  <polygon points="520,235 535,255 505,255" fill="#ffd700"/>
  <!-- Tapiz -->
  <rect x="60" y="100" width="24" height="200" fill="#1a0a28" stroke="#5e35b1" stroke-width="2"/>
  <rect x="716" y="100" width="24" height="200" fill="#1a0a28" stroke="#5e35b1" stroke-width="2"/>
</svg>
