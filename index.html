<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forest Hero - Rescata a la Princesa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://www.gstatic.com/firebasejs/11.3.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.3.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore-compat.js"></script>
</head>
<body class="arcade-body">
    <div class="arcade-root">
    <!-- Pantalla de bienvenida (login/registro) -->
    <div id="welcome-screen" class="overlay-screen"></div>

    <!-- Pantalla de inicio (historia) -->
    <div id="start-screen" class="overlay-screen"></div>

    <!-- Pantalla de fin -->
    <div id="end-screen" class="overlay-screen"></div>

    <!-- Pantalla de ayuda -->
    <div id="help-screen" class="overlay-screen"></div>

    <!-- Salón de Honor -->
    <div id="honor-hall-screen" class="overlay-screen"></div>

    <!-- Juego principal -->
    <div id="game-container" class="game-container arcade-cabinet-screen">
        <!-- Header -->
        <header class="game-header">
            <h1 class="arcade-title">FOREST HERO</h1>
            <button id="btn-help" class="btn-help" title="Ayuda" aria-label="Ayuda">?</button>
        </header>

        <!-- Layout principal -->
        <div class="game-layout">
            <!-- Columna izquierda: Narrativa -->
            <div class="column-left">
                <div class="panel narrative-panel">
                    <h3 class="panel-title"><span class="panel-title-tag">LOG</span> Crónica</h3>
                    <div id="narrative" class="narrative-scroll"></div>
                </div>
            </div>

            <!-- Columna derecha: Mapa + Stats + Inventario + Kills -->
            <div class="column-right">
                <div class="panel minimap-panel">
                    <h3 class="panel-title"><span class="panel-title-tag">RADAR</span> Alrededores</h3>
                    <div id="minimap" class="minimap-arcade" aria-label="Radar del bosque cercano"></div>
                </div>

                <div class="panel stats-panel">
                    <h3 class="panel-title"><span class="panel-title-tag">STATUS</span> Estado</h3>
                    <div id="stats"></div>
                </div>

                <div class="panel inventory-panel-container">
                    <div id="inventory-panel"></div>
                </div>

                <div class="panel kills-panel">
                    <div id="kill-list"></div>
                </div>
            </div>
        </div>

        <!-- Zona inferior: Criatura + Acciones -->
        <div class="game-bottom">
            <div class="panel creature-panel" id="creature-panel">
                <div id="creature-display"></div>
            </div>

            <div class="panel actions-panel">
                <div id="actions"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
    </div>
</body>
</html>
